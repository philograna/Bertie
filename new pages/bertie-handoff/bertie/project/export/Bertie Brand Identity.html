document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

orgia, serif;\n    --sans:  \"Geist\", -apple-system, BlinkMacSystemFont, \"Helvetica Neue\", sans-serif;\n    --mono:  \"Geist Mono\", ui-monospace, \"SF Mono\", Menlo, monospace;\n  }\n\n  * { box-sizing: border-box; }\n  html, body { margin: 0; padding: 0; }\n  body {\n    font-family: var(--sans);\n    color: var(--ink-900);\n    background: var(--cream-50);\n    font-size: 15px;\n    line-height: 1.55;\n    -webkit-font-smoothing: antialiased;\n    text-rendering: optimizeLegibility;\n  }\n\n  .page { max-width: 1240px; margin: 0 auto; padding: 64px 56px 96px; }\n\n  /* ——— Top bar ——— */\n  .topbar {\n    display: flex; align-items: center; justify-content: space-between;\n    padding-bottom: 28px; margin-bottom: 56px;\n    border-bottom: 1px solid color-mix(in oklab, var(--ink-700) 14%, transparent);\n  }\n  .topbar .mark { display: flex; align-items: center; gap: 12px; }\n  .topbar .mark img { width: 36px; height: 36px; border-radius: 8px; }\n  .topbar .mark span { font-family: var(--serif); font-size: 26px; letter-spacing: -0.01em; }\n  .topbar .meta { font-family: var(--mono); font-size: 11px; color: var(--ink-500); text-transform: uppercase; letter-spacing: 0.08em; }\n  .topbar .meta b { color: var(--ink-900); font-weight: 500; }\n\n  /* ——— Section scaffolding ——— */\n  section { margin-bottom: 88px; }\n  .eyebrow {\n    font-family: var(--mono); font-size: 11px; color: var(--caramel-700);\n    text-transform: uppercase; letter-spacing: 0.14em;\n    display: flex; align-items: center; gap: 10px; margin-bottom: 18px;\n  }\n  .eyebrow::before {\n    content: \"\"; width: 18px; height: 1px; background: var(--caramel-700);\n  }\n  h1 { font-family: var(--serif); font-weight: 400; font-size: 88px; line-height: 0.95; letter-spacing: -0.025em; margin: 0; }\n  h2 { font-family: var(--serif); font-weight: 400; font-size: 44px; line-height: 1.05; letter-spacing: -0.02em; margin: 0 0 12px; }\n  h3 { font-family: var(--sans); font-weight: 500; font-size: 13px; text- troke=\"currentColor\" stroke-width=\"2\"><path d=\"M3 11l9-8 9 8v10a1 1 0 0 1-1 1h-5v-6h-6v6H4a1 1 0 0 1-1-1z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <div class=\"tab\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M12 7v5l3 2\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <div class=\"tab\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M3 6h18M3 12h18M3 18h18\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <div class=\"tab\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"12\" cy=\"8\" r=\"4\"><\u002Fcircle><path d=\"M4 21c0-4 4-7 8-7s8 3 8 7\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"components\">\n        <div class=\"comp-card\">\n          <div class=\"ctitle\">Pulsanti<\u002Fdiv>\n          <div class=\"btn-row\">\n            <button class=\"btn primary\">Aggiungi cane<\u002Fbutton>\n            <button class=\"btn ink\">Prenota toelettatore<\u002Fbutton>\n            <button class=\"btn ghost\">Annulla<\u002Fbutton>\n            <button class=\"btn cream\">Modifica profilo<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"comp-card\">\n          <div class=\"ctitle\">Chip · categorie mappa dog-friendly<\u002Fdiv>\n          <div class=\"chip-row\">\n            <span class=\"chip active\"><span class=\"dot\"><\u002Fspan>Tutti<\u002Fspan>\n            <span class=\"chip\">Parchi<\u002Fspan>\n            <span class=\"chip\">Spiagge<\u002Fspan>\n            <span class=\"chip\">Ristoranti<\u002Fspan>\n            <span class=\"chip\">Veterinari<\u002Fspan>\n            <span class=\"chip\">Toelettatori<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"comp-card\">\n          <div class=\"ctitle\">Input · diario salute<\u002Fdiv>\n          <div class=\"input-row\">\n            <input class=\"input\" placeholder=\"Aggiungi una nota su Bertie…\">\n            <button class=\"btn primary\">Salva<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"comp-card\">\n          <div class=\"ctitle\">Reminder · impostazioni<\u002Fdiv>\n          <div class=\"toggle-row\">\n            <div class=\"toggle\"><div class=\"name\">Vaccini<span>Avviso 30 giorni prima della scadenza<\u002Fspan><\u002Fdiv><div class=\"switch on\"><\u002Fdiv><\u002Fdiv>\n            <div class=\"toggle\"><div class=\"name\">Antiparassitari<span>Promemoria mensile<\u002Fspan><\u002Fdiv><div class=\"switch on\"><\u002Fdiv><\u002Fdiv>\n            <div class=\"toggle\"><div class=\"name\">Visite veterinarie<span>Due giorni prima dell'appuntamento<\u002Fspan><\u002Fdiv><div class=\"switch\"><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- Voice & tone -->\n  <section>\n    <div class=\"eyebrow\">08 — Tone of voice<\u002Fdiv>\n    <h2>Parla come un amico che capisce di cani.<\u002Fh2>\n    <div class=\"voice\" style=\"margin-top: 36px;\">\n      <div class=\"col yes\">\n        <div class=\"hd\">● Bertie dice<\u002Fdiv>\n        <ul>\n          <li>\"Antiparassitario di Bertie oggi — nascondilo nel formaggino.\"<\u002Fli>\n          <li>\"Tra 30 giorni scade il richiamo dell'esavalente. Lo prenotiamo?\"<\u002Fli>\n          <li>\"Anna ti aspetta alle 15:30 per la toelettatura.\"<\u002Fli>\n          <li>\"Due passeggiate oggi. Stasera dorme che è una bellezza.\"<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"col no\">\n        <div class=\"hd\">○ Bertie non dice<\u002Fdiv>\n        <ul>\n          <li>\"Pet care optimization unlocked! 🐶🎉\"<\u002Fli>\n          <li>\"Hai mancato l'obiettivo di oggi.&nbsp;😢\"<\u002Fli>\n          <li>\"Ehi pet parent! Pronto a spaccare?\"<\u002Fli>\n          <li>\"ERROR: medication entry failed.\"<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- Handoff -->\n  <section>\n    <div class=\"eyebrow\">09 — Handoff sviluppo<\u002Fdiv>\n    <h2>Da incollare in Claude Code.<\u002Fh2>\n    <p class=\"lede\" style=\"margin-bottom: 28px;\">Token completi più un prompt in una riga. Mettilo nella root del progetto Kompet → Bertie e chiedi a Claude Code di applicarlo al design system esistente.<\u002Fp>\n\n    <div class=\"handoff\">\n      <div class=\"hdr\">\n        <div class=\"l\">\n          <div class=\"lights\"><span><\u002Fspan><span><\u002Fspan><span><\u002Fspan><\u002Fdiv>\n          <span class=\"name\">bertie-tokens.css &nbsp;·&nbsp; prompt for Claude Code<\u002Fspan>\n        <\u002Fdiv>\n        <button class=\"copy\" id=\"copyBtn\">Copy prompt<\u002Fbutton>\n      <\u002Fdiv>\n<pre id=\"codeBlock\"><span class=\"c\">/* ─────────────────────────────────────────────────────────────\n   PROMPT FOR CLAUDE CODE\n   Paste the line below in your repo to apply the Bertie brand:\n   ───────────────────────────────────────────────────────────── */<\u002Fspan>\n\n<span class=\"s\">Rinomina il progetto da Kompet a Bertie e applica la nuova brand identity: sostituisci i design token attuali con le variabili CSS qui sotto (superfici crema #F6ECC8, gold primario #E8A859, testo bowtie #464949), passa al font Instrument Serif per i titoli e Geist per la UI, arrotonda card e bottoni ai radius indicati, e usa il gold per CTA primarie, tab attiva e card del cane. Sostituisci ogni occorrenza testuale di \"Kompet\" con \"Bertie\" mantenendo la lingua italiana. Il logo si trova in /assets/bertie-logo.png. Le feature MVP da preservare: profilo cane, tracker vaccini, reminder antiparassitari, diario salute, mappa dog-friendly. Le feature Premium (€0,99/mese): AI veterinario, prenotazione groomer, passaporto EU, community locale. Aggiungi una nuova tab \"Accessori\" con griglia di prodotti consigliati per razza/taglia/età del cane, sorgenti Amazon e Arcaplanet — ogni card ha tag sorgente, prezzo, CTA \"Acquista\" con link di affiliazione (sostituire {AMAZON_AFFILIATE_TAG} e {ARCAPLANET_AFFILIATE_ID} via env). Disclaimer in fondo alla tab: \"Bertie può ricevere una commissione sugli acquisti.\"<\u002Fspan>\n\n<span class=\"c\">/* bertie-tokens.css */<\u002Fspan>\n<span class=\"k\">:root<\u002Fspan> {\n  <span class=\"c\">/* Color */<\u002Fspan>\n  <span class=\"k\">--bertie-cream-50<\u002Fspan>:    <span class=\"v\">#FBF6E2<\u002Fspan>;\n  <span class=\"k\">--bertie-cream-100<\u002Fspan>:   <span class=\"v\">#F6ECC8<\u002Fspan>; <span class=\"c\">/* primary surface */<\u002Fspan>\n  <span class=\"k\">--bertie-cream-200<\u002Fspan>:   <span class=\"v\">#EFE0A8<\u002Fspan>;\n  <span class=\"k\">--bertie-gold-300<\u002Fspan>:    <span class=\"v\">#F0B97A<\u002Fspan>;\n  <span class=\"k\">--bertie-gold-500<\u002Fspan>:    <span class=\"v\">#E8A859<\u002Fspan>; <span class=\"c\">/* brand · primary action */<\u002Fspan>\n  <span class=\"k\">--bertie-gold-600<\u002Fspan>:    <span class=\"v\">#D28C45<\u002Fspan>; <span class=\"c\">/* hover */<\u002Fspan>\n  <span class=\"k\">--bertie-caramel-700<\u002Fspan>: <span class=\"v\">#B77336<\u002Fspan>; <span class=\"c\">/* accent */<\u002Fspan>\n  <span class=\"k\">--bertie-caramel-800<\u002Fspan>: <span class=\"v\">#8C5524<\u002Fspan>;\n  <span class=\"k\">--bertie-ink-900<\u002Fspan>:     <span class=\"v\">#2A2C2C<\u002Fspan>;\n  <span class=\"k\">--bertie-ink-700<\u002Fspan>:     <span class=\"v\">#464949<\u002Fspan>; <span class=\"c\">/* body text · bowtie */<\u002Fspan>\n  <span class=\"k\">--bertie-ink-500<\u002Fspan>:     <span class=\"v\">#6B6E6E<\u002Fspan>;\n  <span class=\"k\">--bertie-ink-300<\u002Fspan>:     <span class=\"v\">#A7A8A8<\u002Fspan>;\n\n  <span class=\"c\">/* Semantic */<\u002Fspan>\n  <span class=\"k\">--color-bg<\u002Fspan>:          <span class=\"v\">var(--bertie-cream-50)<\u002Fspan>;\n  <span class=\"k\">--color-surface<\u002Fspan>:     <span class=\"v\">var(--bertie-cream-100)<\u002Fspan>;\n  <span class=\"k\">--color-card<\u002Fspan>:        <span class=\"v\">#FFFFFF<\u002Fspan>;\n  <span class=\"k\">--color-primary<\u002Fspan>:     <span class=\"v\">var(--bertie-gold-500)<\u002Fspan>;\n  <span class=\"k\">--color-primary-hover<\u002Fspan>:<span class=\"v\">var(--bertie-gold-600)<\u002Fspan>;\n  <span class=\"k\">--color-on-primary<\u002Fspan>:  <span class=\"v\">#FFFFFF<\u002Fspan>;\n  <span class=\"k\">--color-accent<\u002Fspan>:      <span class=\"v\">var(--bertie-caramel-700)<\u002Fspan>;\n  <span class=\"k\">--color-text<\u002Fspan>:        <span class=\"v\">var(--bertie-ink-700)<\u002Fspan>;\n  <span class=\"k\">--color-text-strong<\u002Fspan>: <span class=\"v\">var(--bertie-ink-900)<\u002Fspan>;\n  <span class=\"k\">--color-text-muted<\u002Fspan>:  <span class=\"v\">var(--bertie-ink-500)<\u002Fspan>;\n  <span class=\"k\">--color-border<\u002Fspan>:      <span class=\"v\">color-mix(in oklab, var(--bertie-ink-700) 12%, transparent)<\u002Fspan>;\n\n  <span class=\"c\">/* Type */<\u002Fspan>\n  <span class=\"k\">--font-display<\u002Fspan>: <span class=\"v\">\"Instrument Serif\", Georgia, serif<\u002Fspan>;\n  <span class=\"k\">--font-sans<\u002Fspan>:    <span class=\"v\">\"Geist\", system-ui, sans-serif<\u002Fspan>;\n  <span class=\"k\">--font-mono<\u002Fspan>:    <span class=\"v\">\"Geist Mono\", ui-monospace, monospace<\u002Fspan>;\n  <span class=\"k\">--text-display<\u002Fspan>:<span class=\"v\">56px / 1.0<\u002Fspan>;\n  <span class=\"k\">--text-h1<\u002Fspan>:     <span class=\"v\">40px / 1.05<\u002Fspan>;\n  <span class=\"k\">--text-h2<\u002Fspan>:     <span class=\"v\">24px / 1.2<\u002Fspan>;\n  <span class=\"k\">--text-body<\u002Fspan>:   <span class=\"v\">15px / 1.55<\u002Fspan>;\n  <span class=\"k\">--text-small<\u002Fspan>:  <span class=\"v\">13px / 1.5<\u002Fspan>;\n  <span class=\"k\">--text-caption<\u002Fspan>:<span class=\"v\">11px / 1.4<\u002Fspan>;\n\n  <span class=\"c\">/* Shape */<\u002Fspan>\n  <span class=\"k\">--radius-sm<\u002Fspan>: <span class=\"v\">10px<\u002Fspan>;\n  <span class=\"k\">--radius-md<\u002Fspan>: <span class=\"v\">14px<\u002Fspan>;\n  <span class=\"k\">--radius-lg<\u002Fspan>: <span class=\"v\">18px<\u002Fspan>;\n  <span class=\"k\">--radius-xl<\u002Fspan>: <span class=\"v\">22px<\u002Fspan>;\n  <span class=\"k\">--radius-pill<\u002Fspan>: <span class=\"v\">999px<\u002Fspan>;\n\n  <span class=\"c\">/* Elevation */<\u002Fspan>\n  <span class=\"k\">--shadow-soft<\u002Fspan>: <span class=\"v\">0 1px 0 rgba(0,0,0,.02), 0 12px 28px -18px rgba(140,85,36,.30)<\u002Fspan>;\n  <span class=\"k\">--shadow-lift<\u002Fspan>: <span class=\"v\">0 30px 60px -40px rgba(140,85,36,.45)<\u002Fspan>;\n}\n\n<span class=\"c\">/* Primary button */<\u002Fspan>\n<span class=\"k\">.btn-primary<\u002Fspan> {\n  background: <span class=\"v\">var(--color-primary)<\u002Fspan>;\n  color: <span class=\"v\">var(--color-on-primary)<\u002Fspan>;\n  border-radius: <span class=\"v\">var(--radius-pill)<\u002Fspan>;\n  padding: <span class=\"v\">10px 18px<\u002Fspan>;\n  font: <span class=\"v\">500 14px/1 var(--font-sans)<\u002Fspan>;\n}\n<span class=\"k\">.btn-primary:hover<\u002Fspan> { background: <span class=\"v\">var(--color-primary-hover)<\u002Fspan>; }\n<\u002Fpre>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer>\n    <span>Bertie · Brand v0.2 · ex Kompet<\u002Fspan>\n    <span>Maggio 2026 · pronto per l'handoff<\u002Fspan>\n  <\u002Ffooter>\n<\u002Fmain>\n\n<script>\n  document.getElementById('copyBtn').addEventListener('click', async () => {\n    const txt = document.getElementById('codeBlock').innerText;\n    try {\n      await navigator.clipboard.writeText(txt);\n      const b = document.getElementById('copyBtn');\n      const o = b.textContent;\n      b.textContent = 'Copied ✓';\n      setTimeout(() => b.textContent = o, 1600);\n    } catch (e) {}\n  });\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
